services:
  # PostgreSQLデータベース
  postgres:
    image: postgres:15-alpine
    container_name: postgres-contactform
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contactform
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contactform-network

  # APIアプリケーション
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contactform-api
    ports:
      - "8080:8080"
    # .envファイルから環境変数を読み込む（docker-composeが自動的に読み込む）
    # 注意: ADMIN_PASSWORD_HASHの$文字は$$でエスケープが必要
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/contactform?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - contactform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:

networks:
  contactform-network:
    driver: bridge
